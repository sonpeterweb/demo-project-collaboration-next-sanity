name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    env:
      APP_URL: http://127.0.0.1:3000
      GITHUB_ID: ci-github-id
      GITHUB_SECRET: ci-github-secret
      NEXTAUTH_SECRET: ci-nextauth-secret-for-testing-only
      NEXT_PUBLIC_SANITY_PROJECT_ID: ci-sanity-project
      NEXT_PUBLIC_SANITY_DATASET: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test -- --ci

      - run: npm run build

  e2e:
    name: Playwright e2e (chromium)
    runs-on: ubuntu-latest
    needs: quality
    env:
      APP_URL: http://127.0.0.1:3000
      GITHUB_ID: ci-github-id
      GITHUB_SECRET: ci-github-secret
      NEXTAUTH_SECRET: ci-nextauth-secret-for-testing-only
      NEXT_PUBLIC_SANITY_PROJECT_ID: ci-sanity-project
      NEXT_PUBLIC_SANITY_DATASET: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run e2e
        env:
          CI: true
